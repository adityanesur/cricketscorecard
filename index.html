<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>Premier Gully · DRS Scorekeeper | Ultimate Cricket Counter + Replay</title>
    <meta name="description" content="Premier Gully - Advanced gully cricket run counter with Undo, Edit, Innings History, plus built-in DRS recording & replay.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 70% 20%, #1e2a36 0%, #0a0e12 90%);
            padding: clamp(0.75rem, 2.5vw, 2rem);
        }

        /* Main Scoreboard Card */
        .scoreboard {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(18, 25, 32, 0.88);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 30px 50px -20px black, 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            padding: clamp(1.2rem, 3vw, 2.5rem);
            color: #ecf3f8;
        }

        .header-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .title-section h1 {
            font-size: clamp(1.4rem, 5vw, 2.3rem);
            background: linear-gradient(145deg, #fff, #7bc5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title-section p {
            font-size: 0.85rem;
            color: #9bbdd4;
        }
        .visitor-counter {
            background: rgba(0, 20, 40, 0.7);
            border: 1px solid #2f8fbb;
            border-radius: 60px;
            padding: 0.4rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .visitor-number {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(145deg, #fff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .action-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
        }
        .premium-btn {
            background: rgba(20, 35, 48, 0.9);
            border: 1.5px solid #3f6990;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #d5ecff;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .premium-btn:hover {
            background: #1f405d;
            border-color: #7bb0da;
            transform: translateY(-2px);
        }
        .recording-active {
            background: #c44536;
            border-color: #ffaa88;
            animation: pulseRed 1.2s infinite;
        }
        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(196,69,54,0.5); }
            70% { box-shadow: 0 0 0 8px rgba(196,69,54,0); }
            100% { box-shadow: 0 0 0 0 rgba(196,69,54,0); }
        }

        .runs-panel {
            background: #0f1a21cc;
            border-radius: 32px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            border: 1px solid #2e6a8a;
        }
        .total-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
        }
        .score-display {
            display: flex;
            align-items: baseline;
            gap: 0.2rem;
            flex-wrap: wrap;
        }
        .runs-value {
            font-size: clamp(2.8rem, 12vw, 5.5rem);
            font-weight: 700;
            background: linear-gradient(145deg, #fff, #b0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .wickets-value {
            font-size: clamp(2.8rem, 12vw, 5.5rem);
            background: linear-gradient(145deg, #ffb0b0, #ff5e5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .overs-value, .rate-value {
            font-size: clamp(1.5rem, 6vw, 2.6rem);
            font-weight: 500;
            color: #ddf4ff;
        }
        .ball-count {
            background: #1e3343;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .button-group {
            margin-bottom: 1.2rem;
        }
        .group-title {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #7fb4d4;
            margin-bottom: 0.5rem;
        }
        .button-grid {
            display: grid;
            gap: 0.7rem;
        }
        .runs-grid { grid-template-columns: repeat(5, 1fr); }
        .specials-grid { grid-template-columns: repeat(4, 1fr); }
        .action-btn {
            background: #182b36;
            border: 1.5px solid #2f6991;
            padding: 0.8rem 0.2rem;
            border-radius: 44px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #d1ecff;
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
        }
        .action-btn:hover {
            background: #1f405a;
            transform: translateY(-2px);
        }

        .over-history {
            background: #0d1a24cc;
            border-radius: 36px;
            padding: 1rem;
            border: 1px solid #2f6e8f;
            margin-top: 1rem;
        }
        .balls-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .ball-chip {
            background: #1c3140;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            border: 1px solid #3f80aa;
            font-size: 0.85rem;
        }

        /* ===== ORIGINAL SCORECARD INNINGS HISTORY STYLING ===== */
        .innings-card {
            background: #1b3140;
            border-radius: 36px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            border: 1px solid #467a9e;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
        }
        .innings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }
        .innings-header strong {
            font-size: 1.2rem;
            font-weight: 500;
            color: #d3edff;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
        }
        .delete-innings {
            background: #312f4a;
            border: 1px solid #b57f7f;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            color: #ffcfcf;
            font-weight: 450;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255, 100, 100, 0.2);
            transition: 0.1s;
        }
        .delete-innings:hover {
            background: #523f3f;
            transform: scale(1.02);
        }
        .over-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem;
            background: #12303f;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            margin-bottom: 0.6rem;
            border-left: 5px solid #5499c9;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }
        .over-label {
            font-weight: 600;
            color: #aacede;
            min-width: 60px;
            font-size: 0.9rem;
        }
        .over-runs {
            background: #204a60;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #ffe6a3;
            border: 1px solid #ffb347;
            white-space: nowrap;
        }
        .ball-badge {
            background: #204a60;
            border-radius: 30px;
            padding: 0.2rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #71b0db;
            color: #dff2ff;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }
        .ball-badge:hover {
            background: #2f6680;
            border-color: #b0e0ff;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.25);
        }
        .ball-badge.wide, .ball-badge.noball { border-color: #dba059; color: #ffebc8; }
        .ball-badge.wicket { border-color: #cf6f6f; color: #ffdbdb; }
        .ball-badge.dot { border-color: #759bb9; color: #d2ecff; }

        /* ========== ORIGINAL ANIMATION & POPUP ========== */
        .animation-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .float-anim {
            background: rgba(0, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 1rem 2rem;
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px cyan, 0 0 40px #00aaff;
            transform: scale(0.6);
            animation: fadePop 0.55s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.6);
            white-space: nowrap;
            letter-spacing: 4px;
            text-align: center;
        }
        @keyframes fadePop {
            0% { opacity: 0; transform: scale(0.5); }
            40% { opacity: 1; transform: scale(1.1); }
            80% { opacity: 0.9; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.4); }
        }

        .modal, .popup-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 5, 12, 0.75);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card, .popup-card {
            background: #172b38;
            border-radius: 48px;
            padding: 1.8rem;
            max-width: 90%;
            width: 400px;
            border: 1px solid #6c9fd1;
            box-shadow: 0 40px 70px -20px #000, 0 0 0 1px #6c9fd1 inset, 0 0 30px rgba(0, 255, 255, 0.2);
            text-align: center;
        }
        .popup-card h2 {
            font-weight: 400;
            color: #b3defa;
            margin-bottom: 1.2rem;
            font-size: 1.4rem;
            text-shadow: 0 0 8px rgba(0,255,255,0.3);
        }
        .popup-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            justify-content: center;
            margin: 0.5rem 0 1rem;
        }
        .popup-btn {
            background: #254c62;
            border: 1.5px solid #80bbee;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            color: #e5f3ff;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 0 15px rgba(0,255,255,0.15);
        }
        .popup-btn:hover {
            background: #2f6685;
            border-color: #b0e0ff;
            transform: scale(1.02);
        }
        #popupCancel {
            background: #2f3e4a;
            border-color: #787f8a;
            margin-top: 0.3rem;
        }

        /* ========== DRS MODAL ========== */
        .drs-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 5, 12, 0.92);
            backdrop-filter: blur(20px);
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 1rem;
        }
        .drs-card {
            background: #0f1f2b;
            max-width: 1300px;
            width: 100%;
            border-radius: 48px;
            border: 1px solid #2b9bc2;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
            padding: 1.5rem;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }
        .drs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .drs-header h2 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff, #3bc0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .close-drs {
            background: none;
            border: none;
            font-size: 2rem;
            color: #8fcbff;
            cursor: pointer;
        }
        .drs-video-container {
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            max-height: 45vh;
            border: 1px solid #0af;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }
        .drs-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.1s ease;
        }
        .drs-controls-area {
            overflow-y: auto;
            padding-right: 0.2rem;
            flex: 1;
        }
        .drs-controls-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin: 0.5rem 0;
            background: #03161f80;
            padding: 0.8rem;
            border-radius: 60px;
        }
        .zoom-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #0b1f2c;
            padding: 0.3rem 1rem;
            border-radius: 50px;
        }
        .pan-arrow-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            background: #0b1f2c;
            padding: 0.5rem 0.8rem;
            border-radius: 50px;
        }
        .arrow-row {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }
        .ctrl-icon {
            background: #1f4a66;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-icon.reset {
            background: #e67e22;
            font-size: 1rem;
        }
        .ctrl-icon:hover {
            background: #e67e22;
            transform: scale(1.03);
        }
        .frame-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.7rem;
            margin: 1rem 0;
        }
        .frame-btn {
            background: #1f4862cc;
            border: 1px solid #5fa7cc;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .buffer-status {
            background: #03101680;
            border-radius: 28px;
            padding: 0.7rem;
            text-align: center;
            margin-top: 0.8rem;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #2d4a5e;
            border-radius: 10px;
            margin-top: 8px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0af, #0ff);
            width: 0%;
            border-radius: 10px;
        }
        @media (max-width: 680px) {
            .runs-grid { grid-template-columns: repeat(3, 1fr); }
            .specials-grid { grid-template-columns: repeat(2, 1fr); }
            .drs-controls-row { flex-direction: column; align-items: stretch; }
            .zoom-group { justify-content: center; }
            .pan-arrow-pad { align-self: center; }
            .ctrl-icon { width: 40px; height: 40px; }
        }
        @media (max-width: 500px) {
            .runs-grid { grid-template-columns: repeat(2, 1fr); }
            .action-btns button { font-size: 0.7rem; padding: 0.4rem 0.7rem; }
        }
        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71dd;
            backdrop-filter: blur(12px);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            z-index: 10000;
        }
    </style>
</head>
<body>
<div class="scoreboard">
    <div class="header-grid">
        <div class="title-section">
            <h1>🏏 PREMIER GULLY · DRS</h1>
            <p>undo · edit · innings history · replay analysis</p>
        </div>
        <div class="visitor-counter">
            <span>👥</span>
            <span class="visitor-number" id="visitorCount">18.4k</span>
        </div>
        <div class="action-btns">
            <button class="premium-btn" id="undoBtn">↩️ UNDO</button>
            <button class="premium-btn" id="resetBtn">➕ NEW INNINGS</button>
            <button class="premium-btn" id="scorecardBtn">📋 SCORE CARD</button>
            <button class="premium-btn" id="drsStartBtn">🎥 START REC</button>
            <button class="premium-btn" id="drsStopBtn" disabled>⏹️ STOP</button>
            <button class="premium-btn" id="drsReplayBtn">📽️ REPLAY</button>
        </div>
    </div>

    <div class="runs-panel">
        <div class="total-row">
            <div class="score-block">
                <span class="score-label">SCORE</span>
                <div class="score-display">
                    <span class="runs-value" id="runsDisplay">0</span>
                    <span class="slash">/</span>
                    <span class="wickets-value" id="wicketsDisplay">0</span>
                </div>
            </div>
            <div class="score-block">
                <span class="score-label">OVERS</span>
                <span class="overs-value" id="oversDisplay">0.0</span>
                <span class="ball-count" id="ballInOverDisplay">0 balls</span>
            </div>
            <div class="score-block">
                <span class="score-label">RUN RATE</span>
                <span class="rate-value" id="runRateDisplay">0.0</span>
            </div>
        </div>
    </div>

    <div class="buttons-container">
        <div class="button-group">
            <div class="group-title">🏏 RUNS</div>
            <div class="button-grid runs-grid">
                <button class="action-btn" data-action="1">1</button>
                <button class="action-btn" data-action="2">2</button>
                <button class="action-btn" data-action="3">3</button>
                <button class="action-btn special-4" data-action="4">4</button>
                <button class="action-btn special-6" data-action="6">6</button>
            </div>
        </div>
        <div class="button-group">
            <div class="group-title">⚡ SPECIALS</div>
            <div class="button-grid specials-grid">
                <button class="action-btn special-noball" data-action="noball">NO BALL</button>
                <button class="action-btn special-wide" data-action="wide">WIDE</button>
                <button class="action-btn special-wicket" data-action="wicket">WICKET</button>
                <button class="action-btn" data-action="dot">● DOT</button>
            </div>
        </div>
    </div>

    <div class="over-history">
        <div class="over-title">📋 CURRENT OVER</div>
        <div class="balls-container" id="currentOverBalls"></div>
    </div>
</div>

<!-- DRS MODAL -->
<div id="drsModal" class="drs-modal">
    <div class="drs-card">
        <div class="drs-header">
            <h2>🎬 DRS REVIEW · ULTRA EDGE</h2>
            <button class="close-drs" id="closeDrsModalBtn">&times;</button>
        </div>
        <div class="drs-video-container">
            <video id="drsReplayVideo" class="drs-video" controls playsinline></video>
        </div>
        <div class="drs-controls-area">
            <div class="drs-controls-row">
                <div class="zoom-group">
                    <span>🔍 ZOOM</span>
                    <button class="ctrl-icon" id="drsZoomOut">−</button>
                    <button class="ctrl-icon" id="drsZoomReset">⟳</button>
                    <button class="ctrl-icon" id="drsZoomIn">+</button>
                    <span id="drsZoomPercent" style="min-width: 50px;">100%</span>
                </div>
                <div class="pan-arrow-pad">
                    <div class="arrow-row"><div></div><button class="ctrl-icon" id="drsPanUp">▲</button><div></div></div>
                    <div class="arrow-row"><button class="ctrl-icon" id="drsPanLeft">◀</button><button class="ctrl-icon reset" id="drsPanReset">●</button><button class="ctrl-icon" id="drsPanRight">▶</button></div>
                    <div class="arrow-row"><div></div><button class="ctrl-icon" id="drsPanDown">▼</button><div></div></div>
                </div>
            </div>
            <div class="frame-buttons">
                <button class="frame-btn" id="drsPrevFrame">⏪ Prev Frame</button>
                <button class="frame-btn" id="drsNextFrame">Next Frame ⏩</button>
                <button class="frame-btn" id="drsFastPrev">⏪⏪ -0.5s</button>
                <button class="frame-btn" id="drsFastNext">+0.5s ⏩⏩</button>
            </div>
            <div class="buffer-status">
                <div>📀 Buffer: <span id="drsBufferInfo">0s / 300s</span></div>
                <div class="progress-bar"><div class="progress-fill" id="drsBufferFill"></div></div>
                <div id="drsFrameTime" style="margin-top:6px; font-family:monospace;">⏱️ Frame: -- / -- | Time: --:--</div>
            </div>
        </div>
    </div>
</div>

<!-- Innings modal & popup -->
<div id="scoreModal" class="modal"><div class="modal-card"><div style="display:flex; justify-content:space-between;"><span style="font-size:1.3rem;">📜 INNINGS HISTORY</span><button class="close-modal" id="closeModalBtn">&times;</button></div><div id="inningsList"></div></div></div>
<div id="runPopup" class="popup-modal"><div class="popup-card"><h2 id="popupTitle">select value</h2><div id="popupButtonContainer" class="popup-buttons"></div><button class="popup-btn" id="popupCancel">cancel</button></div></div>
<div id="animationContainer" class="animation-overlay"></div>

<script>
    (function(){
        // ---------- SCORECARD STATE (fully functional) ----------
        let inningsList = [];
        let currentInningsIndex = -1;
        let currentOverBalls = [];
        let currentBallCount = 0;
        let totalRuns = 0;
        let undoStack = [];

        function getCurrentWickets() {
            if(currentInningsIndex === -1) return 0;
            let w = 0;
            inningsList[currentInningsIndex].oversData.forEach(over => over.forEach(b => { if(b.includes('wicket')) w++; }));
            currentOverBalls.forEach(b => { if(b.includes('wicket')) w++; });
            return w;
        }
        function getOversString() {
            if(currentInningsIndex === -1) return '0.0';
            let completed = inningsList[currentInningsIndex]?.oversData?.length || 0;
            return `${completed}.${currentBallCount}`;
        }
        function getRunRate() {
            let completed = inningsList[currentInningsIndex]?.oversData?.length || 0;
            let overs = completed + (currentBallCount/6);
            if(overs === 0) return 0;
            return (totalRuns / overs).toFixed(1);
        }
        function saveCurrent() { if(currentInningsIndex !== -1) inningsList[currentInningsIndex].totalRuns = totalRuns; }
        function pushUndo() {
            if(currentInningsIndex === -1) return;
            let oversCopy = inningsList[currentInningsIndex].oversData.map(o => [...o]);
            undoStack.push({ totalRuns, currentOverBalls: [...currentOverBalls], currentBallCount, oversData: oversCopy, inningsIndex: currentInningsIndex });
            if(undoStack.length > 25) undoStack.shift();
        }
        function undo() {
            if(undoStack.length === 0) { animate('⛔ no undo'); return; }
            let prev = undoStack.pop();
            if(currentInningsIndex !== prev.inningsIndex) return;
            totalRuns = prev.totalRuns; currentOverBalls = prev.currentOverBalls; currentBallCount = prev.currentBallCount;
            inningsList[currentInningsIndex].oversData = prev.oversData.map(o => [...o]);
            saveCurrent(); refreshDisplay(); animate('↩️ undone');
        }
        function refreshDisplay() {
            document.getElementById('runsDisplay').innerText = totalRuns;
            document.getElementById('wicketsDisplay').innerText = getCurrentWickets();
            document.getElementById('oversDisplay').innerText = getOversString();
            document.getElementById('ballInOverDisplay').innerText = currentBallCount + (currentBallCount === 1 ? ' ball' : ' balls');
            document.getElementById('runRateDisplay').innerText = getRunRate();
            const container = document.getElementById('currentOverBalls');
            container.innerHTML = '';
            if(currentInningsIndex === -1) { container.innerHTML = '<span class="ball-chip">⚡ start innings</span>'; return; }
            if(currentOverBalls.length === 0 && currentBallCount === 0) container.innerHTML = '<span class="ball-chip">ready</span>';
            else currentOverBalls.forEach(ball => { let chip = document.createElement('span'); chip.className = 'ball-chip'; chip.innerText = ball; container.appendChild(chip); });
        }
        function animate(text) {
            const animDiv = document.getElementById('animationContainer');
            const el = document.createElement('div');
            el.className = 'float-anim';
            el.innerText = text;
            animDiv.innerHTML = '';
            animDiv.appendChild(el);
            setTimeout(() => { if(animDiv.firstChild === el) animDiv.innerHTML = ''; }, 550);
        }
        function startNewInnings() {
            if(currentInningsIndex !== -1) saveCurrent();
            inningsList.push({ totalRuns: 0, oversData: [] });
            currentInningsIndex = inningsList.length - 1;
            totalRuns = 0; currentOverBalls = []; currentBallCount = 0; undoStack = [];
            refreshDisplay(); animate('NEW INNINGS');
        }
        function checkActive() { if(currentInningsIndex === -1) startNewInnings(); }
        function handleBall(ballSymbol, runsAdded = 0, isDot = false, noIncrement = false) {
            checkActive(); pushUndo();
            if(currentBallCount === 6) {
                if(currentOverBalls.length) inningsList[currentInningsIndex].oversData.push([...currentOverBalls]);
                currentOverBalls = []; currentBallCount = 0;
            }
            if(!isDot) totalRuns += runsAdded;
            currentOverBalls.push(ballSymbol);
            if(!noIncrement && !(ballSymbol.includes('WD') || ballSymbol.includes('NB'))) currentBallCount++;
            if(currentBallCount === 6) {
                inningsList[currentInningsIndex].oversData.push([...currentOverBalls]);
                currentOverBalls = []; currentBallCount = 0;
            }
            saveCurrent(); refreshDisplay();
        }
        function showPopup(type, callback, options = null) {
            let popup = document.getElementById('runPopup');
            let titleMap = { wicket: '➕ runs before wicket', wide: '➕ wide extra runs', noball: '➕ no-ball extra', edit: 'edit delivery' };
            document.getElementById('popupTitle').innerText = titleMap[type] || 'select';
            let btnCont = document.getElementById('popupButtonContainer');
            btnCont.innerHTML = '';
            let opts = options || (type === 'wicket' ? [0,1,2] : [0,1]);
            opts.forEach(v => {
                let b = document.createElement('button');
                b.className = 'popup-btn';
                b.innerText = typeof v === 'string' ? v : '+' + v;
                b.onclick = () => { popup.style.display = 'none'; callback(v); };
                btnCont.appendChild(b);
            });
            document.getElementById('popupCancel').onclick = () => popup.style.display = 'none';
            popup.style.display = 'flex';
        }
        function handleRun(v) { handleBall(v.toString(), v, false, false); animate(v); }
        function handleDot() { handleBall('dot', 0, true, false); animate('⬤'); }
        function handleWicket() {
            showPopup('wicket', (runs) => {
                checkActive(); pushUndo();
                if(currentBallCount === 6) { if(currentOverBalls.length) inningsList[currentInningsIndex].oversData.push([...currentOverBalls]); currentOverBalls = []; currentBallCount = 0; }
                totalRuns += runs;
                currentOverBalls.push(runs ? `wicket+${runs}` : 'wicket');
                currentBallCount++;
                if(currentBallCount === 6) { inningsList[currentInningsIndex].oversData.push([...currentOverBalls]); currentOverBalls = []; currentBallCount = 0; }
                saveCurrent(); refreshDisplay(); animate('🪓 WICKET');
            });
        }
        function handleWide() {
            showPopup('wide', (ex) => {
                checkActive(); pushUndo();
                if(currentBallCount === 6) { if(currentOverBalls.length) inningsList[currentInningsIndex].oversData.push([...currentOverBalls]); currentOverBalls = []; currentBallCount = 0; }
                totalRuns += ex;
                currentOverBalls.push(ex ? `WD+${ex}` : 'WD');
                saveCurrent(); refreshDisplay(); animate('↗️ WIDE');
            });
        }
        function handleNoball() {
            showPopup('noball', (ex) => {
                checkActive(); pushUndo();
                if(currentBallCount === 6) { if(currentOverBalls.length) inningsList[currentInningsIndex].oversData.push([...currentOverBalls]); currentOverBalls = []; currentBallCount = 0; }
                totalRuns += ex;
                currentOverBalls.push(ex ? `NB+${ex}` : 'NB');
                saveCurrent(); refreshDisplay(); animate('⚠️ NO BALL');
            }, [0,1,2,3,4,6]);
        }
        function openScorecard() {
            let modal = document.getElementById('scoreModal');
            let listDiv = document.getElementById('inningsList');
            listDiv.innerHTML = '';
            if(inningsList.length === 0) listDiv.innerHTML = '<div class="innings-card">no innings</div>';
            else {
                inningsList.forEach((inns, idx) => {
                    let card = document.createElement('div');
                    card.className = 'innings-card';
                    card.innerHTML = `<div class="innings-header"><strong>INNINGS ${idx+1} · ${inns.totalRuns} runs</strong><button class="delete-innings" data-index="${idx}">🗑 delete</button></div><div id="overs-${idx}"></div>`;
                    listDiv.appendChild(card);
                    let oversDiv = document.getElementById(`overs-${idx}`);
                    if(!inns.oversData.length) oversDiv.innerHTML = '<div class="over-row">no overs bowled</div>';
                    else {
                        inns.oversData.forEach((over, oidx) => {
                            let overRuns = over.reduce((sum, ball) => {
                                if(ball === 'dot') return sum;
                                if(ball.includes('WD')||ball.includes('NB')) { let m = ball.match(/\+(\d)/); return sum + (m ? parseInt(m[1]) : 0); }
                                if(ball.includes('wicket')) { let m = ball.match(/\+(\d)/); return sum + (m ? parseInt(m[1]) : 0); }
                                let n = parseInt(ball); return sum + (isNaN(n) ? 0 : n);
                            }, 0);
                            let row = document.createElement('div');
                            row.className = 'over-row';
                            row.innerHTML = `<span class="over-label">OV${oidx+1}</span><span class="over-runs">${overRuns} runs</span>`;
                            over.forEach((ball, bidx) => {
                                let badge = document.createElement('span');
                                badge.className = 'ball-badge';
                                if(ball.includes('WD')||ball.includes('NB')) badge.classList.add('wide');
                                else if(ball.includes('wicket')) badge.classList.add('wicket');
                                else if(ball === 'dot') badge.classList.add('dot');
                                badge.innerText = ball;
                                badge.dataset.innings = idx;
                                badge.dataset.over = oidx;
                                badge.dataset.ball = bidx;
                                badge.addEventListener('click', (e) => {
                                    e.stopPropagation();
                                    let i = parseInt(e.target.dataset.innings);
                                    let o = parseInt(e.target.dataset.over);
                                    let b = parseInt(e.target.dataset.ball);
                                    let oldVal = inningsList[i].oversData[o][b];
                                    showPopup('edit', (newVal) => {
                                        if(currentInningsIndex === i) pushUndo();
                                        inningsList[i].oversData[o][b] = newVal;
                                        let newTotal = 0;
                                        inningsList[i].oversData.forEach(over => {
                                            over.forEach(ball => {
                                                if(ball === 'dot') return;
                                                if(ball.includes('WD')||ball.includes('NB')) { let m = ball.match(/\+(\d)/); if(m) newTotal += parseInt(m[1]); }
                                                else if(ball.includes('wicket')) { let m = ball.match(/\+(\d)/); if(m) newTotal += parseInt(m[1]); }
                                                else { let n = parseInt(ball); if(!isNaN(n)) newTotal += n; }
                                            });
                                        });
                                        inningsList[i].totalRuns = newTotal;
                                        if(i === currentInningsIndex) totalRuns = newTotal;
                                        saveCurrent(); refreshDisplay(); openScorecard(); animate('✏️ edited');
                                    }, ['dot','1','2','3','4','6','WD','WD+1','NB','NB+1','NB+2','wicket','wicket+1']);
                                });
                                row.appendChild(badge);
                            });
                            oversDiv.appendChild(row);
                        });
                    }
                });
                document.querySelectorAll('.delete-innings').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        let idx = parseInt(btn.dataset.index);
                        inningsList.splice(idx,1);
                        if(inningsList.length === 0) { currentInningsIndex = -1; totalRuns = 0; currentOverBalls = []; currentBallCount = 0; }
                        else { if(currentInningsIndex >= idx) currentInningsIndex--; if(currentInningsIndex < 0) currentInningsIndex = 0; totalRuns = inningsList[currentInningsIndex]?.totalRuns || 0; }
                        undoStack = []; refreshDisplay(); openScorecard();
                    });
                });
            }
            modal.style.display = 'flex';
        }
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let a = btn.dataset.action;
                if(a === '1') handleRun(1); else if(a === '2') handleRun(2); else if(a === '3') handleRun(3);
                else if(a === '4') handleRun(4); else if(a === '6') handleRun(6); else if(a === 'dot') handleDot();
                else if(a === 'wicket') handleWicket(); else if(a === 'wide') handleWide(); else if(a === 'noball') handleNoball();
            });
        });
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('resetBtn').addEventListener('click', startNewInnings);
        document.getElementById('scorecardBtn').addEventListener('click', openScorecard);
        document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('scoreModal').style.display='none');
        window.addEventListener('click', e => { if(e.target === document.getElementById('scoreModal')) document.getElementById('scoreModal').style.display='none'; if(e.target === document.getElementById('runPopup')) document.getElementById('runPopup').style.display='none'; });
        startNewInnings();

        // ---------- DRS SYSTEM (background recording, full features, arrow pad) ----------
        let mediaStream = null, mediaRecorder = null, recordedChunks = [], totalBufferDuration = 0, isRecording = false, hiddenVideo = null;
        const MAX_BUFFER = 300;
        function updateBufferUI() {
            let percent = (totalBufferDuration / MAX_BUFFER) * 100;
            document.getElementById('drsBufferInfo').innerText = `${Math.floor(totalBufferDuration)}s / ${MAX_BUFFER}s`;
            let fill = document.getElementById('drsBufferFill');
            if(fill) fill.style.width = `${Math.min(100, percent)}%`;
        }
        function maintainBuffer() {
            while(totalBufferDuration > MAX_BUFFER && recordedChunks.length) {
                let old = recordedChunks.shift();
                totalBufferDuration -= old.duration;
                if(old.url) URL.revokeObjectURL(old.url);
            }
            updateBufferUI();
        }
        function addChunk(blob, durationSec) {
            if(!blob || blob.size === 0) return;
            let url = URL.createObjectURL(blob);
            recordedChunks.push({ blob, url, duration: durationSec });
            totalBufferDuration += durationSec;
            maintainBuffer();
        }
        async function startRecording() {
            if(isRecording) { showMsg("Already recording", false); return; }
            try {
                const constraints = { video: { facingMode: "environment", width: { ideal: 1024 }, height: { ideal: 720 } }, audio: false };
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                if(!hiddenVideo) { hiddenVideo = document.createElement('video'); hiddenVideo.style.display = 'none'; hiddenVideo.autoplay = true; hiddenVideo.muted = true; document.body.appendChild(hiddenVideo); }
                hiddenVideo.srcObject = mediaStream;
                await hiddenVideo.play();
                const mime = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType: mime });
                mediaRecorder.ondataavailable = (e) => { if(e.data.size) addChunk(e.data, 2.0); };
                mediaRecorder.start(2000);
                isRecording = true;
                document.getElementById('drsStartBtn').disabled = true;
                document.getElementById('drsStopBtn').disabled = false;
                document.getElementById('drsStartBtn').classList.add('recording-active');
                showMsg("🎥 Recording started (background)", false);
            } catch(err) { showMsg("Camera error: " + err.message, true); }
        }
        function stopRecording() {
            if(!isRecording) return;
            if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            if(hiddenVideo) hiddenVideo.srcObject = null;
            isRecording = false;
            document.getElementById('drsStartBtn').disabled = false;
            document.getElementById('drsStopBtn').disabled = true;
            document.getElementById('drsStartBtn').classList.remove('recording-active');
            showMsg("Recording stopped, buffer saved", false);
        }
        function showMsg(msg, isErr) {
            let d = document.createElement('div'); d.className = 'message'; d.innerText = msg; d.style.background = isErr ? '#e67e22dd' : '#2ecc71dd';
            document.body.appendChild(d); setTimeout(()=>d.remove(), 2500);
        }
        let replayZoom = 1, replayPanX = 0, replayPanY = 0, replayVideo = null;
        function applyReplayTransform() { if(replayVideo) { replayVideo.style.transform = `scale(${replayZoom}) translate(${replayPanX/replayZoom}px, ${replayPanY/replayZoom}px)`; document.getElementById('drsZoomPercent').innerText = `${Math.round(replayZoom*100)}%`; } }
        async function openReplay() {
            if(recordedChunks.length === 0) { showMsg("No recording. Press START REC first.", true); return; }
            let modal = document.getElementById('drsModal');
            replayVideo = document.getElementById('drsReplayVideo');
            try {
                let blobs = recordedChunks.map(c => c.blob);
                let combined = new Blob(blobs, { type: 'video/mp4' });
                let url = URL.createObjectURL(combined);
                if(replayVideo.src) URL.revokeObjectURL(replayVideo.src);
                replayVideo.src = url;
                replayVideo.load();
                await replayVideo.play();
                replayZoom = 1; replayPanX = 0; replayPanY = 0; applyReplayTransform();
                const updateFrame = () => { if(replayVideo.duration) { let fps=30, total=Math.floor(replayVideo.duration*fps), curr=Math.floor(replayVideo.currentTime*fps), m=Math.floor(replayVideo.currentTime/60), s=Math.floor(replayVideo.currentTime%60); document.getElementById('drsFrameTime').innerText = `⏱️ Frame: ${curr+1}/${total} | Time: ${m}:${s.toString().padStart(2,'0')}`; } };
                replayVideo.addEventListener('timeupdate', updateFrame);
                document.getElementById('drsPrevFrame').onclick = () => { if(replayVideo.duration) { replayVideo.currentTime = Math.max(0, replayVideo.currentTime - 1/30); replayVideo.pause(); updateFrame(); } };
                document.getElementById('drsNextFrame').onclick = () => { if(replayVideo.duration) { replayVideo.currentTime = Math.min(replayVideo.duration, replayVideo.currentTime + 1/30); replayVideo.pause(); updateFrame(); } };
                document.getElementById('drsFastPrev').onclick = () => { if(replayVideo.duration) { replayVideo.currentTime = Math.max(0, replayVideo.currentTime - 0.5); replayVideo.pause(); updateFrame(); showMsg('⏪ -0.5s',false); } };
                document.getElementById('drsFastNext').onclick = () => { if(replayVideo.duration) { replayVideo.currentTime = Math.min(replayVideo.duration, replayVideo.currentTime + 0.5); replayVideo.pause(); updateFrame(); showMsg('⏩ +0.5s',false); } };
                modal.style.display = 'flex';
            } catch(e) { showMsg("Replay error: " + e.message, true); }
        }
        function setupReplayControls() {
            document.getElementById('drsZoomIn').onclick = () => { replayZoom = Math.min(replayZoom+0.2,3); applyReplayTransform(); };
            document.getElementById('drsZoomOut').onclick = () => { replayZoom = Math.max(replayZoom-0.2,1); if(replayZoom===1){ replayPanX=0; replayPanY=0; } applyReplayTransform(); };
            document.getElementById('drsZoomReset').onclick = () => { replayZoom=1; replayPanX=0; replayPanY=0; applyReplayTransform(); };
            document.getElementById('drsPanUp').onclick = () => { if(replayZoom>1){ replayPanY+=30; applyReplayTransform(); } };
            document.getElementById('drsPanDown').onclick = () => { if(replayZoom>1){ replayPanY-=30; applyReplayTransform(); } };
            document.getElementById('drsPanLeft').onclick = () => { if(replayZoom>1){ replayPanX+=30; applyReplayTransform(); } };
            document.getElementById('drsPanRight').onclick = () => { if(replayZoom>1){ replayPanX-=30; applyReplayTransform(); } };
            document.getElementById('drsPanReset').onclick = () => { replayPanX=0; replayPanY=0; applyReplayTransform(); };
        }
        document.getElementById('drsStartBtn').addEventListener('click', startRecording);
        document.getElementById('drsStopBtn').addEventListener('click', stopRecording);
        document.getElementById('drsReplayBtn').addEventListener('click', openReplay);
        document.getElementById('closeDrsModalBtn').addEventListener('click', () => { document.getElementById('drsModal').style.display='none'; if(replayVideo && replayVideo.src) URL.revokeObjectURL(replayVideo.src); replayVideo.src=''; });
        window.addEventListener('click', (e) => { if(e.target === document.getElementById('drsModal')) document.getElementById('drsModal').style.display='none'; });
        setupReplayControls();
        let v = localStorage.getItem('premierGullyVisitors');
        if(!v) v = 18429;
        else v = parseInt(v) + (Math.random()>0.7?1:0);
        document.getElementById('visitorCount').innerText = v.toLocaleString();
        localStorage.setItem('premierGullyVisitors', v);
    })();
</script>
</body>
